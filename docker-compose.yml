version: '3.9'

services:
  db:
    image: postgres:15
    container_name: prism-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prism_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prism_secure_pass_2026}
      POSTGRES_DB: ${POSTGRES_DB:-prism_credit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prism-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: prism-backend
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://prism_admin:prism_secure_pass_2026@db:5432/prism_credit}
      ENV: production
    networks:
      - prism-network

  nginx:
    image: nginx:stable-alpine
    container_name: prism-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - prism-network

networks:
  prism-network:
    driver: bridge

volumes:
  postgres_data: